server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://inbuilt-loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push

scrape_configs:
  - job_name: custom-app-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: custom-app-logs
          __path__: /var/log/app/*.log